<!DOCTYPE html>
<html>

<head>

</head>

<div id="homeScreen">

    <img src="logo.png" class="logo">

    <div class="ad">
        Advertisement
    </div>

    <img src="start.png" 
    class="menuButton"
    onclick="startGame()">

    class="menuButton"
    onclick="openSettings()">

</div>

<div id="settingsScreen" class="hidden">

    <div class="credits">

        <h2>Credits</h2>

        Founder: Andrew S<br>

        -----------------------------<br><br>

        Artist: Jackson S<br>
        Lead Developer: Jackson S

    </div>


    <button onclick="goHome()">
        Back
    </button>


</div>




<!-- GAME -->

<div id="gameScreen" class="hidden">


    <div class="ad">
        Advertisement
    </div>


    <h2>
        Score:
        <span id="score">0</span>
    </h2>


    <div id="board"></div>


    <div id="pieces"></div>


</div>



<script src="script.js"></script>

</html>
